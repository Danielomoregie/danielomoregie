<svg xmlns="http://www.w3.org/2000/svg" width="900" height="60" viewBox="0 0 900 60">
  <defs>
    <style>
      @keyframes scroll {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-40px); }
      }
      .blocks { animation: scroll 0.6s linear infinite; }
      @keyframes bob {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-3px); }
      }
      .steve { animation: bob 0.6s ease-in-out infinite; }
      @keyframes blink {
        0%, 90%, 100% { opacity: 1; }
        95%            { opacity: 0; }
      }
      .eyes { animation: blink 3s ease-in-out infinite; }
      @keyframes drift {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-900px); }
      }
      .clouds { animation: drift 28s linear infinite; }
    </style>
